name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - '7.0'

jobs:
  lint:
    runs-on: ubuntu-slim
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - run: npm ci
      - run: npm run lint

  build:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    runs-on: ubuntu-slim
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
      - run: npm run build
      - run: git diff --color --exit-code

  test-node:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    runs-on: ubuntu-slim
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
      - run: npm run test:parallel

  test-firefox:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - run: npm ci
      - run: xvfb-run -- npm run ci
        env:
          JASMINE_BROWSER: firefox

  test-safari:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - run: osascript -e 'get version of application "Safari"'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - run: npm ci
      - run: npm run ci
        env:
          JASMINE_BROWSER: safari

  test-chrome:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - run: npm ci
      - run: xvfb-run -- npm run ci
        env:
          JASMINE_BROWSER: chrome

  test-gjs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - run: sudo apt-get update
      - run: sudo apt-get install -y gjs

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - run: npm ci
      - run: npm run test:gjs
